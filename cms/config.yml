backend:
  name: github
  repo: jacs4210/platzifc-web
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Media files stored in the repo under cms/public/uploads
media_folder: "cms/public/uploads"
public_folder: "/uploads"

# Enable local development mode with npx decap-server
local_backend: true

collections:

  # ──────────────────────────────
  # NOTICIAS
  # ──────────────────────────────
  - name: "news"
    label: "Noticias"
    folder: "cms/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Categoría", name: "category", widget: "select",
          options: ["Resultados", "Fichajes", "Formación", "Club", "Comunidad"] }
      - { label: "Autor", name: "author", widget: "string" }
      - { label: "Fecha de publicación", name: "date", widget: "datetime" }
      - { label: "Imagen destacada", name: "image", widget: "image" }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }
      - { label: "Publicado", name: "published", widget: "boolean", default: true }

  # ──────────────────────────────
  # JUGADORES
  # ──────────────────────────────
  - name: "players"
    label: "Plantilla"
    folder: "cms/content/players"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre completo", name: "name", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Dorsal", name: "number", widget: "number" }
      - { label: "Posición", name: "position", widget: "select",
          options: ["Portero", "Defensa", "Centrocampista", "Delantero"] }
      - { label: "Nacionalidad", name: "nationality", widget: "string" }
      - { label: "Fecha de nacimiento", name: "birthdate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Foto", name: "photo", widget: "image" }
      - { label: "Biografía", name: "bio", widget: "markdown" }
      - { label: "ID en API-Football", name: "api_football_id", widget: "number", required: false }

  # ──────────────────────────────
  # CUERPO TÉCNICO
  # ──────────────────────────────
  - name: "staff"
    label: "Cuerpo Técnico"
    folder: "cms/content/staff"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre completo", name: "name", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Rol", name: "role", widget: "string" }
      - { label: "Foto", name: "photo", widget: "image" }
      - { label: "Biografía", name: "bio", widget: "markdown" }

  # ──────────────────────────────
  # PARTIDOS
  # ──────────────────────────────
  - name: "matches"
    label: "Partidos"
    folder: "cms/content/matches"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Equipo Local", name: "home_team", widget: "string" }
      - { label: "Equipo Visitante", name: "away_team", widget: "string" }
      - { label: "Competición", name: "competition", widget: "string" }
      - { label: "Fecha y hora", name: "date", widget: "datetime" }
      - { label: "Estadio", name: "venue", widget: "string" }
      - { label: "Resultado Local", name: "score_home", widget: "number", required: false }
      - { label: "Resultado Visitante", name: "score_away", widget: "number", required: false }
      - { label: "ID en API-Football", name: "api_football_id", widget: "number", required: false }

  # ──────────────────────────────
  # TABLA DE POSICIONES
  # ──────────────────────────────
  - name: "standings"
    label: "Clasificación"
    folder: "cms/content/standings"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Competición", name: "competition", widget: "string" }
      - { label: "Temporada", name: "season", widget: "string" }
      - label: "Tabla"
        name: "table"
        widget: "list"
        fields:
          - { label: "Posición", name: "position", widget: "number" }
          - { label: "Equipo", name: "team", widget: "string" }
          - { label: "PJ", name: "played", widget: "number" }
          - { label: "G", name: "won", widget: "number" }
          - { label: "E", name: "drawn", widget: "number" }
          - { label: "P", name: "lost", widget: "number" }
          - { label: "GF", name: "goals_for", widget: "number" }
          - { label: "GC", name: "goals_against", widget: "number" }
          - { label: "Pts", name: "points", widget: "number" }

  # ──────────────────────────────
  # PATROCINADORES
  # ──────────────────────────────
  - name: "sponsors"
    label: "Patrocinadores"
    folder: "cms/content/sponsors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image" }
      - { label: "URL web", name: "url", widget: "string" }
      - { label: "Categoría", name: "category", widget: "select",
          options: ["Principal", "Oficial", "Colaborador", "Media Partner"] }
      - { label: "Activo", name: "active", widget: "boolean", default: true }
